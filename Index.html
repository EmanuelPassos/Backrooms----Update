<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BACKROOMS: THE ASCENSION - EMANUEL</title>
    <style>
        :root { --yellow: #ceb26b; --dark: #1a1a1a; }
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; color: var(--yellow); width: 100vw; height: 100vh; }
        
        /* --- TELAS --- */
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; padding: 20px; text-align: center; }
        
        #login-screen { background: #000; border: 4px double var(--yellow); margin: 10px; height: calc(100% - 20px); }
        h1 { font-size: 1.8rem; margin: 0 0 20px 0; letter-spacing: 5px; }
        input { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); padding: 12px; font-size: 1rem; outline: none; text-align: center; margin: 15px; width: 80%; max-width: 300px; }
        
        #loading-screen { background: #000; display: none; }
        .load-bar-container { width: 80%; max-width: 250px; height: 12px; border: 1px solid var(--yellow); margin-top: 20px; padding: 2px; }
        #load-bar { width: 0%; height: 100%; background: var(--yellow); transition: width 0.1s; }

        /* --- EFEITOS ESPECIAIS E VHS --- */
        #vhs-overlay { position: fixed; inset: 0; pointer-events: none; background: url('https://media.giphy.com/media/oEI9uWUic9VKM/giphy.gif'); opacity: 0.08; z-index: 500; display: none; mix-blend-mode: screen; }
        #cinematic-bars { position: fixed; inset: 0; border-top: 12vh solid black; border-bottom: 12vh solid black; z-index: 400; display: none; pointer-events: none; }

        /* ALUCINAÇÃO CSS */
        #insanity-filter { 
            position: fixed; inset: 0; pointer-events: none; z-index: 600; 
            background: rgba(255, 0, 0, 0); transition: background 0.3s;
            display: none;
        }
        .insanity-active { 
            display: block !important;
            animation: glitch-anim 0.2s infinite; 
            backdrop-filter: invert(100%) contrast(150%);
        }
        @keyframes glitch-anim {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(0, 0); }
        }

        button { background: var(--yellow); color: #000; border: none; padding: 15px 35px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 10; display: none; pointer-events: none; text-shadow: 2px 2px #000; font-size: 0.8rem; background: rgba(0,0,0,0.5); padding: 8px; border-left: 3px solid red; }
        #sanity-alert { position: fixed; top: 50%; width: 100%; text-align: center; color: red; font-size: 1.2rem; font-weight: bold; display: none; z-index: 700; text-shadow: 2px 2px #000; }
        
        .joy-area { position: absolute; bottom: 0; width: 50%; height: 65%; z-index: 50; display: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="insanity-filter"></div>
    <div id="vhs-overlay"></div>
    <div id="cinematic-bars"></div>
    <div id="sanity-alert">SANIDADE CRÍTICA</div>

    <div id="login-screen" class="overlay">
        <h1>ASYNC OS v.1.0</h1>
        <p style="font-size: 0.8rem; opacity: 0.8;">IDENTIFIQUE-SE PARA ACESSAR OS ARQUIVOS</p>
        <input type="text" id="username" placeholder="DIGITE SEU NOME" maxlength="15">
        <button id="btn-login">CONECTAR</button>
        <p style="font-size: 0.6rem; margin-top: 40px; opacity: 0.4;">PROPERTY OF ASYNC FOUNDATION © 1989</p>
    </div>

    <div id="loading-screen" class="overlay">
        <p id="load-text" style="letter-spacing: 2px;">ESTABELECENDO CONEXÃO...</p>
        <div class="load-bar-container"><div id="load-bar"></div></div>
    </div>

    <div id="hud">● REC | USER: <span id="user-display">---</span> | KEYS: <span id="k-count">0</span>/7</div>
    <div id="left-area" class="joy-area" style="left:0"></div>
    <div id="right-area" class="joy-area" style="right:0"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        let moveInput = {x:0, y:0}, lookInput = {x:0};
        let isPlaying = false, score = 0, isHallucinating = false;
        const walls = [], keys = [];

        // 1. SETUP DA CENA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1c27d);
        scene.fog = new THREE.Fog(0xd1c27d, 1, 30);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // 2. MUNDO
        const wallMaterial = new THREE.MeshStandardMaterial({color: 0xceb26b});
        for(let x=-12; x<12; x++) {
            for(let z=-12; z<12; z++) {
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshStandardMaterial({color: 0x9c8e5e}));
                floor.rotation.x = -Math.PI/2; floor.position.set(x*8, 0, z*8); scene.add(floor);
                if(Math.random() > 0.8 && (Math.abs(x)>1 || Math.abs(z)>1)) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), wallMaterial);
                    w.position.set(x*8, 3, z*8); scene.add(w); walls.push(w);
                }
            }
        }

        for(let i=0; i<7; i++) {
            const k = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            k.position.set((Math.random()-0.5)*70, 1.2, (Math.random()-0.5)*70);
            scene.add(k); keys.push(k);
        }

        // 3. LOGICA DE TELAS
        document.getElementById('btn-login').onclick = () => {
            const name = document.getElementById('username').value || "EMANUEL";
            document.getElementById('user-display').innerText = name.toUpperCase();
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                startLoading();
            }, 500);
        };

        function startLoading() {
            const screen = document.getElementById('loading-screen');
            const bar = document.getElementById('load-bar');
            screen.style.display = 'flex';
            let p = 0;
            const interval = setInterval(() => {
                p += Math.random() * 8;
                if(p > 100) p = 100;
                bar.style.width = p + '%';
                if(p >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        screen.style.opacity = '0';
                        setTimeout(startCutscene, 600);
                    }, 500);
                }
            }, 60);
        }

        function startCutscene() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('vhs-overlay').style.display = 'block';
            document.getElementById('cinematic-bars').style.display = 'block';
            
            const fall = setInterval(() => {
                if(camera.position.y > 1.8) {
                    camera.position.y -= 0.2;
                    camera.rotation.z += 0.015;
                } else {
                    clearInterval(fall);
                    camera.position.y = 1.8;
                    camera.rotation.z = 0;
                    endCutscene();
                }
            }, 30);
        }

        function endCutscene() {
            document.getElementById('cinematic-bars').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.querySelectorAll('.joy-area').forEach(a => a.style.display = 'block');
            isPlaying = true;
            initJoysticks();
            
            // LOOP DE ALUCINAÇÃO A CADA 20 SEGUNDOS
            setInterval(() => {
                if(isPlaying) triggerInsanity();
            }, 20000);
        }

        function triggerInsanity() {
            isHallucinating = true;
            document.getElementById('insanity-filter').classList.add('insanity-active');
            document.getElementById('sanity-alert').style.display = 'block';
            camera.fov = 100; // FOV tonto
            camera.updateProjectionMatrix();

            setTimeout(() => {
                isHallucinating = false;
                document.getElementById('insanity-filter').classList.remove('insanity-active');
                document.getElementById('sanity-alert').style.display = 'none';
                camera.fov = 75;
                camera.updateProjectionMatrix();
            }, 4000); // Dura 4 segundos
        }

        // 4. CONTROLES
        function initJoysticks() {
            nipplejs.create({ zone: document.getElementById('left-area'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white', size: 100 })
                .on('move', (e, d) => { moveInput = d.vector; })
                .on('end', () => { moveInput = {x:0, y:0}; });

            nipplejs.create({ zone: document.getElementById('right-area'), mode: 'static', position: {right: '70px', bottom: '70px'}, color: 'red', size: 100 })
                .on('move', (e, d) => { lookInput.x = d.vector.x; })
                .on('end', () => { lookInput.x = 0; });
        }

        // 5. LOOP
        function animate() {
            requestAnimationFrame(animate);
            if(!isPlaying) {
                renderer.render(scene, camera);
                return;
            }

            // Sensibilidade muda na alucinação
            const currentLookSpeed = isHallucinating ? 0.12 : 0.06;
            camera.rotation.y -= lookInput.x * currentLookSpeed;

            const speed = isHallucinating ? 0.35 : 0.22;
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            const side = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

            const nx = camera.position.x + (forward.x * moveInput.y * speed) - (side.x * moveInput.x * speed);
            const nz = camera.position.z + (forward.z * moveInput.y * speed) - (side.z * moveInput.x * speed);

            let hit = false;
            for(let w of walls) {
                if(Math.abs(nx - w.position.x) < 4.5 && Math.abs(nz - w.position.z) < 4.5) { hit = true; break; }
            }
            if(!hit) { camera.position.x = nx; camera.position.z = nz; }
            
            // Tremor de câmera na alucinação
            if(isHallucinating) {
                camera.position.y = 1.8 + (Math.random() * 0.15);
            } else {
                camera.position.y = 1.8;
            }

            keys.forEach(k => {
                if(k.visible && camera.position.distanceTo(k.position) < 2) {
                    k.visible = false; score++;
                    document.getElementById('k-count').innerText = score;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
